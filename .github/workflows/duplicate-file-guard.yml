name: Duplicate File Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  duplicate-file-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Check for accidental duplicate files
        run: node scripts/check-duplicate-files.mjs
